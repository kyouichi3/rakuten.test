<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>おすすめまとめ</title>
  <meta name="description" content="おすすめ商品をジャンル別に紹介します。" />

  <!-- テーマ・SEO（site.jsonからJSで差し替え） -->
  <meta name="theme-color" content="#6aa8ff" />

  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <header class="site-header">
    <div class="wrap header-inner">
      <div class="brand">
        <a class="brand-link" href="./" aria-label="トップへ">
          <span class="brand-logo" aria-hidden="true">★</span>
          <span class="brand-title" id="siteTitle">おすすめまとめ</span>
        </a>
        <p class="brand-sub" id="siteDescription">おすすめをカテゴリ別に紹介します。</p>
      </div>

      <div class="header-actions">
        <a class="btn ghost" id="aboutLink" href="#about">このサイトについて</a>
        <span class="badge" title="更新日">🗓️ <span id="updated"></span></span>
      </div>
    </div>
  </header>

  <main class="wrap">
    <section class="toolbar" aria-label="検索と絞り込み">
      <div class="search">
        🔎 <input id="q" type="search" placeholder="検索（例：軽量、時短、充電器）" />
      </div>

      <div class="controls">
        <select id="category" aria-label="カテゴリ"></select>
        <select id="sort" aria-label="並び替え">
          <option value="recommended">おすすめ順</option>
          <option value="newest">新着順</option>
          <option value="popular">人気順</option>
          <option value="priceAsc">価格：安い順</option>
          <option value="priceDesc">価格：高い順</option>
        </select>
      </div>
    </section>

    <section class="tagbar" aria-label="タグで絞り込み">
      <div class="tagbar-head">
        <span class="muted small">タグ：</span>
        <button class="chip active" id="tagAll" type="button">すべて</button>
      </div>
      <div class="tagbar-list" id="tagList"></div>
    </section>

    <section class="summary" aria-label="概要">
      <div class="summary-card">
        <div class="summary-title">今日のおすすめ</div>
        <div class="summary-text" id="summaryText">読み込み中…</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">人気のカテゴリ</div>
        <div class="summary-text" id="summaryCats">読み込み中…</div>
      </div>
      <div class="summary-card">
        <div class="summary-title">運用メモ</div>
        <div class="summary-text small muted">
          追加・編集は <code>data/products.json</code> だけでOK。<br />
          サイト名・色は <code>data/site.json</code> を編集。
        </div>
      </div>
    </section>

    <section class="grid" id="grid" aria-live="polite"></section>

    <section class="note" id="about">
      <h2 class="h2">このサイトについて</h2>
      <p class="muted" id="affiliateDisclosure">
        本サイトにはアフィリエイト広告が含まれています。購入により紹介者に報酬が発生する場合があります。
      </p>
      <p class="muted small" id="siteFooterNote">
        価格・在庫・ポイントは変動します。購入前にリンク先で最新情報をご確認ください。
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrap footer-inner">
      <span class="muted small">© <span id="year"></span> <span id="siteTitle2">おすすめまとめ</span></span>
      <span class="muted small">/ <a class="muted" href="#about">表記</a></span>
    </div>
  </footer>

  <script src="./assets/app.js" defer></script>
</body>
</html>
