<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title id="docTitle">ランキング</title>
  <meta name="description" content="おすすめ商品をランキング形式で紹介します。" />
  <link rel="stylesheet" href="./assets/styles.css" />
</head>
<body>
  <header class="header">
    <div class="wrap header-inner">
      <div class="brand">
        <div class="site-title" id="siteTitle">おすすめランキング</div>
        <div class="site-sub" id="siteSubtitle">ジャンル別に厳選して紹介します。</div>
      </div>

      <div class="header-meta">
        <div class="badge">🗓️ <span id="updated"></span></div>
        <a class="btn ghost" href="#ranking">ランキングへ</a>
      </div>
    </div>
  </header>

  <main class="wrap">
    <!-- 0. 上部注意書き（広告表記） -->
    <section class="notice" id="disclosureBox">
      <b>広告表示：</b><span id="disclosureText">本ページにはアフィリエイト広告が含まれています。</span>
    </section>

    <!-- 1. 目次 -->
    <section class="section" id="toc">
      <h2 class="h2">目次</h2>
      <ol class="toc" id="tocList"></ol>
    </section>

    <!-- 2. ガイド -->
    <section class="section" id="guide">
      <h2 class="h2" id="guideTitle">このジャンルの選び方・違い</h2>
      <div class="card">
        <div class="prose" id="guideBody"></div>
      </div>
    </section>

    <!-- 3. ランキング -->
    <section class="section" id="ranking">
      <h2 class="h2" id="rankingTitle">ランキング</h2>
      <div class="muted small" id="rankingNote"></div>
      <div class="rank-list" id="rankList"></div>
    </section>

    <!-- 4. 話題（記事） -->
    <section class="section" id="topics">
      <h2 class="h2" id="topicsTitle">このジャンルでよくある疑問・話題</h2>
      <div class="topics" id="topicsList"></div>
    </section>

    <!-- 5. 他サイト導線 -->
    <section class="section" id="links">
      <h2 class="h2" id="linksTitle">他ジャンルのおすすめ</h2>
      <div class="card">
        <ul class="links" id="linksList"></ul>
      </div>
    </section>

    <footer class="footer">
      <div class="muted small" id="footerNote">
        価格・在庫・ポイントは変動します。購入前にリンク先で最新情報をご確認ください。
      </div>
      <div class="muted small">© <span id="year"></span> <span id="siteTitle2">おすすめランキング</span></div>
    </footer>
  </main>

  <script src="./assets/app.js" defer></script>
</body>
</html>
